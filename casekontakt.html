<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
    <link rel="stylesheet" href="casestyle.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // https://dashboard.emailjs.com/admin/account
            emailjs.init({
              publicKey: "28gwRKEoJT22MHJMn",
            });
        })();
    </script>
    <script type="text/javascript">
        window.onload = function() {
            document.getElementById('contact-form').addEventListener('submit', function(event) {
                event.preventDefault();
                // these IDs from the previous steps
                emailjs.sendForm('service_o0oe3eo', 'template_35npl4a', this)
                    .then(() => {
                        console.log('SUCCESS!');
                    }, (error) => {
                        console.log('FAILED...', error);
                    });
            });
        }
    </script>
</head>
<body>
    <div class="header">
        <div id="menuBtn">Menu</div>
        <a href="case.html" id="logo">shop</a>
        <div id="basket">Kurv: <p id="count">0</p></div>
            <div class="overlay"></div>
        <nav class="offcanvas" id="offcanvasMenu">
            <button id="closeBtn">Luk</button>
                <ul>
                    <li><a href="case.html">Forside</a></li>
                    <li><a href="#">underside a</a></li>
                    <li><a href="casekontakt.html">Kontakt</a></li>
                </ul>
        </nav>
    </div>

    <form id="contact-form">
        <!-- To simplify the tutorial, the value is static. -->
        <input type="hidden" name="time" value="Mar 10 2025 08:46">
        <label>Name</label>
        <input type="text" name="name" required>
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Subject</label>
        <input type="text" name="title" required>
        <label>Message</label>
        <textarea name="message" required></textarea>
        <input type="submit" value="Send">
    </form>
    <script src="casescript.js"></script>
</body>
</html>
